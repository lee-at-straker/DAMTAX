<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arbitr — Taxonomy Sentry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* ============ DESIGN TOKENS (light theme, mimics NotVerify) ============ */
    :root {
      --bg-page: #FAF9F6;
      --bg-card: #FFFFFF;
      --bg-card-tint: #F7F8FA;
      --bg-hero: #EEF3FB;
      --border: #ECECE6;
      --border-soft: #F0EFE9;
      --text: #1A1A1A;
      --text-2: #4B4B4B;
      --text-muted: #8A8A87;
      --text-dim: #B5B5B0;
      --accent: #2563EB;
      --accent-soft: #E5EEF7;
      --cta: #E89A4F;
      --cta-hover: #D68A3E;
      --success: #10B981;
      --success-soft: #D1FADF;
      --warn: #F59E0B;
      --warn-soft: #FEF3C7;
      --danger: #DC2626;
      --danger-soft: #FEE2E2;
      --info-soft: #DBEAFE;
      --purple-soft: #EDE9FE;
    }

    /* Bynder OEM mode — flips palette */
    html[data-mode="bynder"] {
      --bg-page: #FAFBFC;
      --bg-card: #FFFFFF;
      --bg-hero: #EFF6FF;
      --accent: #1E5BC6;
      --accent-soft: #DDE9FB;
      --cta: #1E5BC6;
      --cta-hover: #1849A8;
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: var(--bg-page);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
    }

    /* ============ TOPBAR ============ */
    .topbar {
      background: var(--bg-page);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
    }
    .brand { display: flex; align-items: center; gap: 14px; font-weight: 600; }
    .brand-mark {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--accent);
      display: inline-flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 13px;
    }
    html[data-mode="bynder"] .brand-mark { background: var(--accent); }
    .brand-divider { color: var(--text-dim); font-weight: 400; margin: 0 2px; }
    .brand-tenant { color: var(--text-2); font-weight: 400; font-size: 14px; }
    .brand-switcher {
      position: relative; display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--accent-soft); color: var(--accent);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: background 0.15s ease;
      border: 1px solid transparent;
    }
    .brand-switcher:hover { background: #D8E7F5; border-color: var(--accent); }
    .brand-switcher svg { width: 12px; height: 12px; }
    .brand-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; z-index: 50;
      cursor: default;
      min-width: 260px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.10);
      padding: 6px; display: none;
    }
    .brand-dropdown.show { display: block; }
    .brand-option {
      padding: 9px 12px; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 13px; color: var(--text);
    }
    .brand-option:hover { background: var(--bg-card-tint); }
    .brand-option.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
    .brand-option .brand-meta { color: var(--text-muted); font-size: 11px; }

    /* ============ TAB NAV ============ */
    .nav-row {
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-page);
    }
    .tab {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 12px 14px;
      font-size: 13.5px; font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      border-radius: 7px;
      margin-bottom: 4px; margin-top: 4px;
      transition: background 120ms, color 120ms;
    }
    .tab:hover { background: var(--border-soft); color: var(--text); }
    .tab.active {
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* ============ STATUS PILLS ============ */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--success-soft);
      border-radius: 999px;
      font-size: 12px; font-weight: 500;
      color: #047857;
    }
    .status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); }

    .mode-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11.5px; color: var(--text-muted);
      cursor: pointer;
    }
    .mode-toggle:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

    /* ============ CARDS ============ */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card-hover { transition: border-color 120ms, transform 120ms; }
    .card-hover:hover { border-color: var(--accent); }

    .card-row {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 22px;
    }
    .icon-tile {
      width: 40px; height: 40px; border-radius: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-tile.blue { background: var(--info-soft); color: var(--accent); }
    .icon-tile.green { background: var(--success-soft); color: #047857; }
    .icon-tile.amber { background: var(--warn-soft); color: #B45309; }
    .icon-tile.purple { background: var(--purple-soft); color: #7C3AED; }
    .icon-tile.gray { background: var(--border-soft); color: var(--text-muted); }

    .card-title { font-weight: 600; color: var(--text); font-size: 14.5px; margin-bottom: 2px; }
    .card-desc { color: var(--text-muted); font-size: 13px; line-height: 1.5; }
    .chev-right { color: var(--text-dim); }

    /* ============ HERO BANNER ============ */
    .hero {
      background: var(--bg-hero);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 26px;
    }
    .cta-btn {
      background: var(--cta);
      color: white;
      font-weight: 500;
      font-size: 13.5px;
      padding: 9px 16px;
      border-radius: 8px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: background 120ms;
    }
    .cta-btn:hover { background: var(--cta-hover); }
    .ghost-btn {
      background: transparent;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 0;
    }
    .ghost-btn:hover { text-decoration: underline; }

    .secondary-btn {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 7px;
    }
    .secondary-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ============ PIPELINE STAGE ============ */
    .stage-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      flex: 1;
    }
    .stage-title { font-weight: 600; font-size: 14px; color: var(--text); }
    .stage-meta { color: var(--text-muted); font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 8px; }
    .arrow-sep { color: var(--text-dim); font-size: 18px; align-self: center; }

    /* ============ SEVERITY PILLS ============ */
    .sev-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
    .sev-high { background: var(--danger-soft); color: var(--danger); }
    .sev-medium { background: var(--warn-soft); color: #B45309; }
    .sev-low { background: var(--accent-soft); color: var(--accent); }
    .lock-pill { background: var(--border-soft); color: var(--text-muted); }

    /* ============ LAYOUT ============ */
    .container { max-width: 1280px; margin: 0 auto; padding: 28px 32px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

    /* ============ TABLES ============ */
    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 14px 18px;
      background: var(--bg-card-tint);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 14px 18px;
      font-size: 13px;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: var(--bg-card-tint); }
    .mono { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 12px; }

    /* ============ FOOTER ============ */
    footer {
      border-top: 1px solid var(--border);
      padding: 22px 32px;
      margin-top: 60px;
      font-size: 11.5px;
      color: var(--text-muted);
    }
    footer .trust-row { display: flex; gap: 18px; }

    /* ============ MISC ============ */
    .step-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); display: inline-block; }
    .step-dot.done { background: var(--success); }
    .step-dot.next { background: var(--text-dim); }
    .you-are-here { box-shadow: 0 0 0 2px var(--accent); }
    .fade-in { animation: fade 240ms ease-out; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .subhead {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .locked { opacity: 0.55; }
    .lock-overlay {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--text-muted);
    }
    .scope-tag {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      border-radius: 6px;
      letter-spacing: 0.02em;
    }

    /* ============ VISUAL AUDIT ============ */
    .va-card { padding: 0; overflow: hidden; }
    .va-card-body { display: flex; align-items: stretch; }
    .va-thumb {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-card-tint);
      border-right: 1px solid var(--border-soft);
      overflow: hidden;
      position: relative;
    }
    .va-thumb img {
      width: 100%; height: 100%;
      display: block;
      object-fit: cover;
      min-height: 240px;
    }
    .va-thumb-meta {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(15, 20, 25, 0.78);
      color: #FAF9F6;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10.5px;
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }
    .va-body { flex: 1; padding: 18px 22px; min-width: 0; }
    .va-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11.5px;
      padding: 3px 8px;
      background: var(--bg-card-tint);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-2);
      margin: 0 6px 6px 0;
    }
    .va-tag .k { color: var(--text-muted); }
    .va-tag .v { color: var(--text); font-weight: 500; }
    .va-tag.changed { background: var(--warn-soft); border-color: #F59E0B; }
    .va-tag.changed .v { color: #B45309; text-decoration: line-through; }
    .va-tag.proposed { background: var(--success-soft); border-color: var(--success); }
    .va-tag.proposed .v { color: #047857; font-weight: 600; }
    .va-verdict {
      margin-top: 12px;
      padding: 14px 16px;
      background: var(--bg-hero);
      border-left: 3px solid var(--accent);
      border-radius: 6px;
    }
    .va-verdict-label {
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10.5px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .va-verdict-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.55;
      font-style: italic;
    }
    .va-confidence-bar {
      display: inline-flex; align-items: center; gap: 6px;
      margin-left: auto;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10.5px;
      color: var(--text-muted);
      font-style: normal;
      letter-spacing: 0.04em;
    }
    .va-confidence-bar .track {
      width: 56px; height: 4px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      overflow: hidden;
    }
    .va-confidence-bar .fill { height: 100%; background: var(--accent); }
    .flag-pill {
      display: inline-flex; align-items: center;
      padding: 3px 9px;
      font-family: 'SF Mono', Menlo, Consolas, monospace;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      border-radius: 4px;
    }
    .flag-CRITICAL    { background: var(--danger-soft);  color: var(--danger); }
    .flag-PENDING     { background: var(--warn-soft);    color: #B45309; }
    .flag-RESOLVED    { background: var(--success-soft); color: #047857; }
    .flag-RECOMMENDED { background: var(--accent-soft);  color: var(--accent); }
  </style>
</head>
<body>

  <!-- ================ TOPBAR ================ -->
  <header class="topbar">
    <div style="max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between;">
      <div class="brand" id="brand-block">
        <!-- populated by applyMode -->
      </div>
      <div style="display: flex; align-items: center; gap: 14px;">
        <button class="mode-toggle" id="mode-toggle" title="Switch between standalone and Bynder-embedded view">
          <i data-lucide="arrow-left-right" class="w-3 h-3"></i>
          <span id="mode-label">arbitr standalone</span>
        </button>
        <span class="status-pill"><span class="dot"></span>All Systems Operational</span>
        <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent-soft); display: inline-flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 600; font-size: 12px;">LK</div>
      </div>
    </div>
  </header>

  <!-- ================ TAB NAV ================ -->
  <div class="nav-row">
    <div style="max-width: 1280px; margin: 0 auto; display: flex; gap: 6px;" id="topnav"></div>
  </div>

  <!-- ================ MAIN ================ -->
  <main id="root" class="container"></main>

  <!-- ================ FOOTER ================ -->
  <footer>
    <div style="max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between;">
      <div id="footer-brand">arbitr — Trust &amp; Intelligence Platform · Taxonomy Sentry module</div>
      <div class="trust-row">
        <span>SOC 2 Type II</span>
        <span>AES-256 Encryption</span>
        <span>In-Region Processing</span>
        <span>GDPR Compliant</span>
      </div>
    </div>
  </footer>

  <script>
  /* ================================================================
     EMBEDDED DATA — real values from the Meridian Industrial Group sandbox + audit
     ================================================================ */
  const TENANT = {
    name: "Meridian Industrial Group",
    url: "straker-sandbox.bynder.com",
    locales: ["en_US", "de_DE", "fr_FR", "nl_NL", "es_ES"],
    metaproperty_count: 13,
    option_count: 96,
    tuple_count: 308
  };

  const FINDINGS = [
    { id: “F-01”, category: “ai_tag_pollution”, label: “AI tag pollution”, count: 98, severity: “high”, sample: “Google Cloud Vision surfaced free-form labels (“Furniture”, “Artisan”, “Job”) alongside structured taxonomy on 98 of 100 assets. No canonical mapping, search index polluted.”, locales: [“all”],
      assets: 517, active_90d: 403, top_collection: “Auto — Showroom Stills”, collection_count: 11, parity_gap: 42 },
    { id: “F-02”, category: “synonym_proliferation”, label: “Synonym proliferation”, count: 46, severity: “medium”, sample: “Vision emitted synonym pairs — “Car” + “Vehicle”, “Machine” + “Equipment” — on 46 assets. Search results fragment; only one maps to a structured option.”, locales: [“all”],
      assets: 94, active_90d: 73, top_collection: “Auto — Workshop B-Roll”, collection_count: 6, parity_gap: 71 },
    { id: “F-03”, category: “structured_vs_ai”, label: “AI vs. structured”, count: 15, severity: “high”, sample: “Structured Industry contradicted by Vision on 15 assets — e.g. Metal & Machining asset where Vision signals Logistics at 85% confidence. Reviewer required.”, locales: [“all”],
      assets: 235, active_90d: 183, top_collection: “Electronics — Datasheet Hero”, collection_count: 8, parity_gap: 88 },
    { id: “F-04”, category: “coverage_erosion”, label: “Coverage erosion”, count: 23, severity: “high”, sample: “Structured Industry blank on 23 assets while Google Cloud Vision surfaces strong industry signals (Food 91%, Plastic 88%, Science 86%). Taxonomy drifts behind what AI sees.”, locales: [“all”],
      assets: 705, active_90d: 549, top_collection: “Pharma — Lab Bench”, collection_count: 14, parity_gap: 100 },
    { id: “F-05”, category: “translation_rot”, label: “Translation rot”, count: 99, severity: “medium”, sample: “99 of 143 metaproperty options carry only an en_US label. de_DE, fr_FR, nl_NL, es_ES translations absent. Multilingual DAM coverage breaks for every affected option.”, locales: [“all”],
      assets: 235, active_90d: 183, top_collection: “Industry — Aerospace_Defense (en)”, collection_count: 5, parity_gap: 96 },
    { id: “F-06”, category: “cross_team_naming”, label: “Cross-team naming drift”, count: 0, severity: “low”, sample: “Dimension excluded from this audit run — requires cross-team tagging history not present in this 100-asset corpus.”, locales: [“all”],
      assets: 0, active_90d: 0, top_collection: “—“, collection_count: 0, parity_gap: 0 }
  ];

  const SAMPLE_VERDICT_ROWS = [
    { mp: "Industry",         option: "(blank)",            locale: "en_US", current: "(unset)",             proposed: "Plastic & Polymer",  rationale: "Coverage erosion. Asset has no Industry tag while Rekognition signals Injection 94% / Plastic 91%. Apply structured tag." },
    { mp: "Industry",         option: "Aerospace_Defense",  locale: "de_DE", current: "(unset)",             proposed: "Luft- und Raumfahrt", rationale: "Translation rot. New option added in English with no translations. Add de_DE / fr_FR / nl_NL / es_ES." },
    { mp: "Tags (free-form)", option: "Person, Adult",      locale: "en_US", current: "Person + Adult",      proposed: "(remove duplicate)",  rationale: "Synonym proliferation. Rekognition emitted two terms for the same concept; structured does not. Keep one canonical." },
    { mp: "Industry",         option: "Electronics & Tech.",locale: "en_US", current: "Electronics & Tech.", proposed: "Plastic & Polymer",   rationale: "Structured-vs-AI contradiction. Structured says Electronics; Rekognition Plastic 95%. Reviewer to confirm." }
  ];

  const VOCAB = [
    { name: "Brand Terms",         entries: 0,   loaded: false, hint: "Names, taglines, products that should never be translated" },
    { name: "Approved Renderings", entries: 0,   loaded: false, hint: "Preferred translation per source term, per locale" },
    { name: "Industry Terms",      entries: 12,  loaded: true,  hint: "Pre-loaded common DAM and marketing vocabulary" },
    { name: "Locale Conventions",  entries: 47,  loaded: true,  hint: "Compound rules, gender, formality, ordering per language" }
  ];

  /* Real measured accuracy from the blind eval against the Meridian Industrial Group golden dataset.
     308 items, 4 target locales, classes balanced as described in the eval report. */
  const EVAL = {
    sample_size: 308,
    baseline: { accuracy: 89.0, precision: 90.3, recall: 54.9, f1: 68.3, label: "Out of box · no brand vocabulary" },
    with_vocab: { accuracy: 93.8, precision: 93.5, recall: 84.3, f1: 88.7, label: "With brand vocabulary loaded" },
    per_mode: [
      { mode: "missing",                base_recall: 100, vocab_recall: 100 },
      { mode: "compound_error",         base_recall: 100, vocab_recall: 100 },
      { mode: "register_mismatch",      base_recall: 33,  vocab_recall: 100 },
      { mode: "untranslated",           base_recall: 0,   vocab_recall: 78 },
      { mode: "word_sense_error",       base_recall: 43,  vocab_recall: 43 },
      { mode: "hallucination",          base_recall: 40,  vocab_recall: 40 }
    ]
  };

  /* Cross-locale findability — assets discoverable in each locale relative to EN.
     The headline number a CMO actually wants to see. */
  const FINDABILITY = {
    total_assets: 19412,
    locales: [
      { code: "de_DE", name: "German",  findable: 14108, dark: 5304, pct: 72.7 },
      { code: "fr_FR", name: "French",  findable: 12421, dark: 6991, pct: 64.0 },
      { code: "nl_NL", name: "Dutch",   findable: 13987, dark: 5425, pct: 72.0 },
      { code: "es_ES", name: "Spanish", findable: 14796, dark: 4616, pct: 76.2 }
    ]
  };

  /* Visual Audit — vision verification layer. A multimodal AI specialist reads
     pixel content and compares it to the asset's manual tags. Every disagreement
     is escalated; nothing is auto-applied. Mirrors the existing Findings card
     pattern so reviewers see asset impact next to every flag. */
  const VISUAL_AUDIT = [
    {
      id: "VA-01",
      file: "meridian_safety_inspection_lifestyle.jpg",
      image: "https://images.unsplash.com/photo-1581094288338-2314dddb7ece?fm=jpg&q=60&w=1200&auto=format&fit=crop",
      current_tags: { "Asset_Sub-Type": "Lifestyle", "Industry": "Automative_Subcontractors", "Material": "Composite" },
      vision: { summary: "Lifestyle composition: technician with branded safety gear in frame. OCR captures 'Meridian · Safety-Grade Composite' from helmet label.", confidence: 92 },

  function vaTagsRow(tags, opts) {
    opts = opts || {};
    return Object.entries(tags).map(([k, v]) => {

      return `<span class="va-tag${cls}"><span class="k">${k}:</span><span class="v">${v}</span></span>`;
    }).join('');
  }
  function vaProposedRow(suggested) {
    if (!suggested) return '';
    return Object.entries(suggested).map(([k, v]) =>
      `<span class="va-tag proposed"><span class="k">${k}:</span><span class="v">${v}</span></span>`
    ).join('');
  }
  function vaConfidence(n) {
    return `<span class="va-confidence-bar">
      <span class="track"><span class="fill" style="width: ${n}%;"></span></span>
      <span>${n} / 100</span>
    </span>`;
  }

          <div>
            <div style="font-size: 20px; font-weight: 600; color: var(--text);">Brand Vocabulary</div>
            <div style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">The authority every audit decision references. Industry and locale baselines are pre-loaded. Brand-specific terms unlock specific corrections and the apply-to-Bynder workflow.</div>
          </div>
          <span class="status-pill" style="background: var(--bg-card-tint); color: var(--text-2); white-space: nowrap;"><span class="dot" style="background: var(--accent);"></span>${VOCAB_VERSION}</span>
        </div>

        <!-- Vocabulary impact strip -->
        <div class="card" style="padding: 18px 22px; margin-bottom: 18px; display: flex; align-items: center; gap: 22px;">
          <div class="icon-tile blue" style="width: 38px; height: 38px;"><i data-lucide="trending-up" class="w-5 h-5"></i></div>
          <div style="flex: 1;">
            <div class="card-title" style="font-size: 14px;">Why this matters</div>
            <div class="card-desc" style="font-size: 12.5px;">Loading brand vocabulary lifts auditor recall from ${EVAL.baseline.recall.toFixed(0)}% to <strong style="color: var(--accent);">${EVAL.with_vocab.recall.toFixed(0)}%</strong> on the same ${EVAL.sample_size}-item eval. Register and word-sense calls become policy lookups instead of model judgments.</div>
          </div>
          <div style="text-align: right;">
            <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px;">Recall lift</div>
            <div style="font-size: 22px; font-weight: 600; color: var(--accent);">+${(EVAL.with_vocab.recall - EVAL.baseline.recall).toFixed(0)} pts</div>
          </div>
        </div>

        <!-- Layered architecture diagram -->
        <div class="card" style="padding: 28px; margin-bottom: 24px;">
          <div class="subhead" style="margin-bottom: 14px;">Vocabulary layers in the auditor</div>
          <svg viewBox="0 0 600 240" style="width: 100%; max-width: 600px; display: block; margin: 0 auto;">
            <line x1="300" y1="70"  x2="160" y2="170" stroke="#E5E5E0" stroke-width="1.5" />
            <line x1="300" y1="70"  x2="300" y2="170" stroke="#E5E5E0" stroke-width="1.5" />
            <line x1="300" y1="70"  x2="440" y2="170" stroke="#E5E5E0" stroke-width="1.5" />
            <circle cx="300" cy="70" r="38" fill="#DBEAFE" stroke="#2563EB" stroke-width="2" />
            <text x="300" y="66" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#2563EB">Auditor</text>
            <text x="300" y="80" text-anchor="middle" font-family="Inter" font-size="10" fill="#2563EB">consumes all 3</text>
            <circle cx="160" cy="170" r="44" fill="#D1FADF" stroke="#10B981" stroke-width="2" />
            <text x="160" y="166" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#047857">System</text>
            <text x="160" y="180" text-anchor="middle" font-family="Inter" font-size="10" fill="#047857">59 baseline entries</text>
            <text x="160" y="194" text-anchor="middle" font-family="Inter" font-size="9" fill="#047857">countries, loanwords, locale rules</text>
            <circle cx="300" cy="170" r="44" fill="${DNT_LIST.filter(d=>!d.system).length ? '#FEF3C7' : '#F7F8FA'}" stroke="${DNT_LIST.filter(d=>!d.system).length ? '#F59E0B' : '#B5B5B0'}" stroke-width="2" />
            <text x="300" y="166" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="${DNT_LIST.filter(d=>!d.system).length ? '#B45309' : '#8A8A87'}">Tenant</text>
            <text x="300" y="180" text-anchor="middle" font-family="Inter" font-size="10" fill="${DNT_LIST.filter(d=>!d.system).length ? '#B45309' : '#8A8A87'}">${DNT_LIST.filter(d=>!d.system).length + PREFERRED_TERMS.length} brand entries</text>
            <text x="300" y="194" text-anchor="middle" font-family="Inter" font-size="9" fill="${DNT_LIST.filter(d=>!d.system).length ? '#B45309' : '#8A8A87'}">customer-owned, versioned</text>
            <circle cx="440" cy="170" r="44" fill="#F7F8FA" stroke="#B5B5B0" stroke-width="2" stroke-dasharray="4 4" />
            <text x="440" y="166" text-anchor="middle" font-family="Inter" font-size="12" font-weight="600" fill="#8A8A87">Workspace</text>
            <text x="440" y="180" text-anchor="middle" font-family="Inter" font-size="10" fill="#8A8A87">multi-brand override</text>
            <text x="440" y="194" text-anchor="middle" font-family="Inter" font-size="9" fill="#8A8A87">for agencies and holdcos</text>
          </svg>
        </div>

        <!-- Do-not-translate list -->
        <div style="margin-bottom: 24px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
            <div>
              <div class="subhead" style="margin: 0;">Do-not-translate list</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">Terms kept verbatim across all locales. System defaults plus your additions.</div>
            </div>
            <button class="ghost-btn"><i data-lucide="plus" class="w-4 h-4"></i> Add term</button>
          </div>
          <div class="card" style="padding: 0; overflow: hidden;">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 30%;">Term</th>
                  <th style="width: 25%;">Category</th>
                  <th style="width: 20%;">Source</th>
                  <th>Effect</th>
                </tr>
              </thead>
              <tbody>
                ${DNT_LIST.map(d => `
                  <tr>
                    <td><span class="mono" style="color: var(--text); font-weight: 500;">${d.term}</span></td>
                    <td style="color: var(--text-2);">${categoryLabel[d.category] || d.category}</td>
                    <td>${d.system ? '<span class="scope-tag">System default</span>' : '<span class="scope-tag" style="background: var(--accent-soft); color: var(--accent);">Tenant added</span>'}</td>
                    <td style="color: var(--text-muted); font-size: 12px;">Auditor will not flag if target == "${d.term}" in any locale.</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Preferred terms -->
        <div style="margin-bottom: 24px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;">
            <div>
              <div class="subhead" style="margin: 0;">Preferred terms (approved renderings)</div>
              <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">Customer-approved translation per source term per locale. Auditor flags drift from these.</div>
            </div>
            <button class="ghost-btn"><i data-lucide="plus" class="w-4 h-4"></i> Add term</button>
          </div>
          <div class="card" style="padding: 0; overflow: hidden;">
            <table class="data-table">
              <thead>
                <tr>
                  <th style="width: 18%;">Source (EN)</th>
                  <th>de_DE</th>
                  <th>fr_FR</th>
                  <th>nl_NL</th>
                  <th>es_ES</th>
                  <th style="width: 32%;">Rationale</th>
                </tr>
              </thead>
              <tbody>
                ${PREFERRED_TERMS.map(p => `
                  <tr>
                    <td><span class="mono" style="color: var(--text); font-weight: 500;">${p.source}</span></td>
                    <td class="mono" style="color: #047857;">${p.de_DE}</td>
                    <td class="mono" style="color: #047857;">${p.fr_FR}</td>
                    <td class="mono" style="color: #047857;">${p.nl_NL}</td>
                    <td class="mono" style="color: #047857;">${p.es_ES}</td>
                    <td style="color: var(--text-muted); font-size: 12px;">${p.rationale}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Vocabulary layers stat tiles -->
        <div class="subhead">Vocabulary layers</div>
        <div class="grid-2" style="margin-bottom: 24px;">
          ${VOCAB.map(v => `
            <div class="card card-row card-hover">
              <div class="icon-tile ${v.loaded ? 'green' : 'gray'}"><i data-lucide="${v.loaded ? 'check-circle-2' : 'circle-dashed'}" class="w-5 h-5"></i></div>
              <div style="flex: 1;">
                <div class="card-title">${v.name}</div>
                <div class="card-desc">${v.hint}</div>
              </div>
              <div style="text-align: right;">
                <div style="font-size: 20px; font-weight: 600; color: ${v.loaded ? 'var(--text)' : 'var(--text-dim)'};">${v.entries}</div>
                <div style="font-size: 11px; color: var(--text-muted);">entries</div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="hero">
          <div style="display: flex; align-items: center; gap: 18px; justify-content: space-between;">
            <div style="display: flex; gap: 16px; align-items: center; flex: 1;">
              <div class="icon-tile blue" style="width: 44px; height: 44px;"><i data-lucide="upload" class="w-5 h-5"></i></div>
              <div>
                <div class="card-title">Onboarding wizard — 3 steps</div>
                <div class="card-desc" style="margin-top: 4px;">Brand basics → loanword review → preferred terms. CSV import or paste-in. Every audit finding then offers an "Add to vocabulary" affordance so it grows organically as you review.</div>
              </div>
            </div>
            <button class="cta-btn">Start onboarding <i data-lucide="arrow-right" class="w-4 h-4"></i></button>
          </div>
        </div>
      </div>
    `;
  }

  function renderEngagement() {
    return `
      <div class="fade-in">
        <div style="margin-bottom: 24px;">
          <div style="font-size: 20px; font-weight: 600; color: var(--text);">Engagement</div>
          <div style="color: var(--text-muted); font-size: 14px; margin-top: 4px;">Your tier is determined by what we detect in your tenant. Unlock the next tier by closing the gap noted on each card.</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 14px;">
          ${TIERS.map(t => `
            <div class="card ${t.current ? 'you-are-here' : ''}" style="padding: 22px 24px;">
              <div style="display: flex; gap: 22px; align-items: flex-start;">
                <div style="flex: 1;">
                  <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
                    <div class="card-title" style="font-size: 16px;">${t.name}</div>
                    ${t.current ? '<span class="scope-tag">you are here</span>' : ''}
                  </div>
                  <div style="color: var(--text-2); font-size: 13.5px; margin-bottom: 8px;">${t.headline}</div>
                  <div class="card-desc" style="margin-bottom: 12px;">${t.blurb}</div>
                  ${t.requires ? `<div style="font-size: 11.5px; color: var(--text-muted); margin-bottom: 12px;"><i data-lucide="key" class="w-3 h-3 inline" style="vertical-align: -2px;"></i> Requires: ${t.requires}</div>` : ''}
                  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                      <div class="subhead" style="margin-bottom: 6px;">What unlocks</div>
                      ${t.unlocks.map(u => `<div style="font-size: 12.5px; color: var(--text-2); margin-bottom: 4px; display: flex; gap: 6px; align-items: flex-start;"><i data-lucide="check" class="w-3 h-3" style="color: var(--success); margin-top: 2px; flex-shrink: 0;"></i> ${u}</div>`).join('')}
                    </div>
                    <div>
                      ${t.gates.length ? `
                        <div class="subhead" style="margin-bottom: 6px;">Gated until next tier</div>
                        ${t.gates.map(g => `<div style="font-size: 12.5px; color: var(--text-muted); margin-bottom: 4px; display: flex; gap: 6px; align-items: flex-start;"><i data-lucide="lock" class="w-3 h-3" style="color: var(--text-dim); margin-top: 2px; flex-shrink: 0;"></i> ${g}</div>`).join('')}
                      ` : `
                        <div class="subhead" style="margin-bottom: 6px;">Next step</div>
                        <div style="font-size: 12.5px; color: var(--text-muted);">${t.next_step}</div>
                      `}
                    </div>
                  </div>
                </div>
                <div style="text-align: right; min-width: 140px;">
                  <div class="subhead">Pricing</div>
                  <div style="font-size: 16px; font-weight: 600; color: var(--text); margin-top: 4px;">${t.price}</div>
                  ${!t.current ? `<button class="secondary-btn" style="margin-top: 12px;">Request upgrade</button>` : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        <div class="card" style="padding: 22px; margin-top: 28px; background: var(--bg-card-tint);">
          <div class="card-title" style="font-size: 14px; margin-bottom: 6px;">Same engine, different gates</div>
          <div class="card-desc">Every tier runs against the same review engine. Upgrading isn't about more software — it's about expanding what the system is allowed to show you, propose, and act on. Human approval stays throughout. That's the moat.</div>
        </div>
      </div>
    `;
  }

  function render() {
    renderTopnav();
    const root = document.getElementById('root');
    if (view === 'dashboard')   root.innerHTML = renderDashboard();
    else if (view === 'findings')   root.innerHTML = renderFindings();
    else if (view === 'visual')     root.innerHTML = renderVisualAudit();
    else if (view === 'governance') root.innerHTML = renderGovernance();
    else if (view === 'vocabulary') root.innerHTML = renderVocabulary();
    else if (view === 'engagement') root.innerHTML = renderEngagement();
    lucide.createIcons();
  }

  applyMode();
  setupModeToggle();
  render();
  </script>
</body>
</html>
